<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menja — Vorschau</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;background:#1A2E1F}
.bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#15251a;border-bottom:1px solid rgba(255,255,255,.08);overflow-x:auto;flex-shrink:0}
.bar b{color:#fff;font-size:13px;margin-right:6px;white-space:nowrap}
.bar a{color:#A8C8A0;font-size:13px;font-weight:600;text-decoration:none;padding:7px 13px;border-radius:99px;border:1px solid rgba(126,200,122,.3);white-space:nowrap;cursor:pointer}
.bar a.on{background:#7EC87A;color:#1A2E1F;border-color:#7EC87A}
iframe{flex:1;width:100%;border:0;background:#1A2E1F}
</style></head>
<body>
<div class="bar">
  <b>Menja Vorschau:</b>
  <a id="t-onboarding">🚀 Onboarding</a>
  <a id="t-welcome">👋 Welcome</a>
  <a id="t-protein">💚 Protein</a>
  <a id="t-app" class="on">📱 App</a>
</div>
<iframe id="frame" src="app.html"></iframe>
<script>
const views={
  onboarding:'preview-onboarding.html',
  welcome:'preview-welcome.html',
  protein:'preview-protein.html',
  app:'app.html'
};
function show(){
  const k=(location.hash||'#app').slice(1);
  const src=views[k]||views.app;
  document.getElementById('frame').src=src;
  Object.keys(views).forEach(id=>{
    const el=document.getElementById('t-'+id);
    if(el)el.classList.toggle('on',id===k);
  });
}
Object.keys(views).forEach(id=>{
  const el=document.getElementById('t-'+id);
  if(el)el.addEventListener('click',()=>{location.hash=id;show();});
});
window.addEventListener('hashchange',show);show();
</script>
</body></html>
